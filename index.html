<!DOCTYPE html>
<html>
<head>
    <title>World Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>World Clock</h1>

        <div class="clock-card">
            <h2>🇮🇳 India (Kolkata)</h2>
            <div id="india"></div>
        </div>

        <div class="clock-card">
            <h2>🇬🇧 United Kingdom (London)</h2>
            <div id="uk"></div>
        </div>

        <div class="clock-card">
            <h2>🇺🇸 USA (New York)</h2>
            <div id="usa"></div>
        </div>

        <div class="clock-card">
            <h2>🇦🇺 Australia (Sydney)</h2>
            <div id="australia"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
